<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Playground</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <link rel="stylesheet" href="src/ui/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">⬡ Neural Playground</span>
        <span class="badge">TF.js</span>
      </div>
      <div class="topbar-right">
        <button id="btn-save" class="btn-sm">Save Model</button>
        <button id="btn-load" class="btn-sm">Load Model</button>
        <button id="btn-export" class="btn-sm">Export JSON</button>
      </div>
    </header>

    <main class="workspace">
      <!-- LEFT: Layer Editor -->
      <aside class="panel panel-left">
        <h2 class="panel-title">Architecture</h2>
        <div id="layer-list" class="layer-list"></div>
        <div class="layer-controls">
          <select id="layer-type">
            <option value="dense">Dense</option>
            <option value="dropout">Dropout</option>
            <option value="activation">Activation</option>
          </select>
          <button id="btn-add-layer" class="btn-primary">+ Add Layer</button>
        </div>
        <div class="model-stats">
          <div class="stat"><span class="stat-label">Parameters</span><span id="param-count" class="stat-value">0</span></div>
          <div class="stat"><span class="stat-label">Layers</span><span id="layer-count" class="stat-value">0</span></div>
        </div>

        <h2 class="panel-title" style="margin-top:1.5rem">Dataset</h2>
        <div class="dataset-btns">
          <button class="btn-dataset active" data-dataset="xor">XOR</button>
          <button class="btn-dataset" data-dataset="spirals">Spirals</button>
          <button class="btn-dataset" data-dataset="moons">Moons</button>
          <button class="btn-dataset" data-dataset="circles">Circles</button>
        </div>
        <label class="slider-label">Noise <span id="noise-val">0.0</span>
          <input type="range" id="noise-slider" min="0" max="0.5" step="0.01" value="0" />
        </label>
        <label class="slider-label">Points <span id="points-val">200</span>
          <input type="range" id="points-slider" min="50" max="500" step="10" value="200" />
        </label>

        <h2 class="panel-title" style="margin-top:1.5rem">Hyperparameters</h2>
        <label class="slider-label">Learning rate <span id="lr-val">0.01</span>
          <input type="range" id="lr-slider" min="-4" max="-1" step="0.25" value="-2" />
        </label>
        <label class="slider-label">Epochs <span id="epochs-val">100</span>
          <input type="range" id="epochs-slider" min="10" max="500" step="10" value="100" />
        </label>
        <label class="slider-label">Batch size <span id="batch-val">32</span>
          <input type="range" id="batch-slider" min="8" max="128" step="8" value="32" />
        </label>
        <select id="optimizer-select">
          <option value="adam">Adam</option>
          <option value="sgd">SGD</option>
          <option value="rmsprop">RMSProp</option>
        </select>
      </aside>

      <!-- CENTER: Visualization -->
      <section class="panel panel-center">
        <div class="canvas-header">
          <h2 class="panel-title">Decision Boundary</h2>
          <div class="train-controls">
            <button id="btn-train" class="btn-train">▶ Train</button>
            <button id="btn-reset" class="btn-sm">Reset</button>
            <span class="epoch-display">Epoch: <strong id="epoch-num">0</strong></span>
          </div>
        </div>
        <canvas id="boundary-canvas" width="420" height="420"></canvas>
        <div class="legend">
          <span class="legend-dot dot-blue"></span><span>Class 0</span>
          <span class="legend-dot dot-coral"></span><span>Class 1</span>
        </div>
      </section>

      <!-- RIGHT: Metrics & Network Viz -->
      <aside class="panel panel-right">
        <h2 class="panel-title">Training Metrics</h2>
        <div class="metric-row">
          <div class="metric-card"><div class="metric-label">Loss</div><div id="loss-val" class="metric-value">—</div></div>
          <div class="metric-card"><div class="metric-label">Accuracy</div><div id="acc-val" class="metric-value">—</div></div>
        </div>
        <canvas id="loss-chart" width="280" height="140"></canvas>
        <canvas id="acc-chart" width="280" height="100"></canvas>

        <h2 class="panel-title" style="margin-top:1.5rem">Network Graph</h2>
        <canvas id="network-canvas" width="280" height="300"></canvas>

        <h2 class="panel-title" style="margin-top:1.5rem">Draw Input</h2>
        <p class="hint">Draw a point, run inference</p>
        <canvas id="draw-canvas" width="280" height="140" class="draw-canvas"></canvas>
        <div class="draw-controls">
          <button id="btn-infer" class="btn-primary">Run Inference</button>
          <button id="btn-clear-draw" class="btn-sm">Clear</button>
        </div>
        <div id="infer-result" class="infer-result"></div>
      </aside>
    </main>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
